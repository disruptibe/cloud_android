name: Compilar APK Disrup-ti.be Cloud (Optimizado)

on:
  push:
    branches:
      - disruptibe-branding
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código fuente
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Configurar Memoria y Desactivar Errores Estrictos
      run: |
        mkdir -p ~/.gradle
        # Asigna suficiente memoria al compilador en la nube
        echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8" >> ~/.gradle/gradle.properties
        # Indica a Android que ignore errores menores de lint/advertencias que detienen el build
        echo "android.lintOptions.abortOnError=false" >> ~/.gradle/gradle.properties

    - name: Generar Keystore Temporal Automático
      run: |
        keytool -genkey -v -keystore app/disruptibe-release.jks -keyalg RSA -keysize 2048 -validity 10000 -alias disruptibe-key -storepass "PasswordTemporal123" -keypass "PasswordTemporal123" -dname "CN=disrup-ti.be, O=Disruptibe, C=ES"

    - name: Compilar y Firmar APK de Producción
      env:
        STORE_FILE: "disruptibe-release.jks"
        STORE_PASSWORD: "PasswordTemporal123"
        KEY_ALIAS: "disruptibe-key"
        KEY_PASSWORD: "PasswordTemporal123"
      run: |
        chmod +x gradlew
        # Se añade x- lint para ignorar alertas cosméticas del compilador
        ./gradlew assembleRelease -x test -x lint

    - name: Publicar APK para descarga interna
      uses: actions/upload-artifact@v4
      with:
        name: App-Disruptibe-Release
        path: app/build/outputs/apk/release/*.apk
        retention-days: 7
