name: Compilar APK Privada Disrup-ti.be (Corrección Gradle)

on:
  push:
    branches:
      - disruptibe-branding
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código fuente
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configurar Entorno de Compilación
      run: |
        mkdir -p ~/.gradle
        echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8" >> ~/.gradle/gradle.properties
        echo "android.lintOptions.abortOnError=false" >> ~/.gradle/gradle.properties
        echo "defaults.project=fake-project" > sentry.properties
        echo "defaults.org=fake-org" >> sentry.properties

    # Inicializa el entorno de Gradle de forma segura con la acción oficial v4
    - name: Configurar Gradle
      uses: gradle/actions/setup-gradle@v4

    # Ejecuta el comando clásico por separado para evitar el parámetro obsoleto
    - name: Compilar con comandos nativos
      run: |
        chmod +x gradlew
        ./gradlew assembleGenericDebug -x test -x lint -x extractDeepLinks -PdisableSentryPlugin=true --no-daemon

    - name: Publicar APK para descarga interna
      uses: actions/upload-artifact@v4
      with:
        name: App-Disruptibe-Release
        path: app/build/outputs/apk/generic/debug/*.apk
        retention-days: 7
