name: Build and Sign Disrup-ti.be Cloud APK.

# Cuándo se ejecutará esta acción:
on:
  push:
    branches: [ "disruptibe-branding" ]
  workflow_dispatch: # Esto habilita un botón para ejecutarlo manualmente cuando quieras

jobs:
  build:
    name: Compilar y Firmar
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código fuente
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Dar permisos a Gradle
        run: chmod +x ./gradlew

      - name: Compilar el APK (Release)
        # Nota: Si Nextcloud requiere una variante específica, puede que necesites cambiar 
        # "assembleRelease" por "assembleGenericRelease" o "assembleGplayRelease"
        run: ./gradlew assembleRelease

      - name: Firmar el APK con los Secrets
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          # Busca el APK generado (la ruta puede variar dependiendo de los 'flavors' de Nextcloud)
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Subir el APK final para descargar
        uses: actions/upload-artifact@v4
        with:
          name: Nextcloud-Release-APK
          path: ${{steps.sign_app.outputs.signedReleaseFile}}
