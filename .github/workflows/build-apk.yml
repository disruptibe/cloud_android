name: Build and Sign Nextcloud APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Compilar y Firmar
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código fuente
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Dar permisos a Gradle
        run: chmod +x ./gradlew

      - name: Compilar el APK (Release)
        run: ./gradlew assembleGenericRelease

      - name: Firmar el APK con los Secrets
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/generic/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          # Especificamos una versión moderna de Build Tools disponible en el sistema
          buildToolsVersion: 34.0.0

      - name: Subir el APK final para descargar
        uses: actions/upload-artifact@v4
        with:
          name: Nextcloud-Release-APK
          path: ${{steps.sign_app.outputs.signedReleaseFile}}
