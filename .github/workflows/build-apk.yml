name: Compilar APK Privada Disrup-ti.be (Estable)

on:
  push:
    branches:
      - disruptibe-branding
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código fuente
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Aceptar Licencias de Android SDK de manera oficial
      run: |
        mkdir -p ${{ linux.android_home || '$ANDROID_HOME' }}/licenses
        echo "24a33b3b76716dd559ebbc13321545bf8476a16e" > ${{ linux.android_home || '$ANDROID_HOME' }}/licenses/android-sdk-license
        echo "84831b9409646a918e30573bab4c9c91346d8abd" > ${{ linux.android_home || '$ANDROID_HOME' }}/licenses/android-sdk-preview-license
        # Forzar la aceptación interactiva en segundo plano
        yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Configurar Entorno de Compilación
      run: |
        mkdir -p ~/.gradle
        echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8" >> ~/.gradle/gradle.properties
        echo "android.lintOptions.abortOnError=false" >> ~/.gradle/gradle.properties

    - name: Generar Keystore Temporal Automático
      run: |
        keytool -genkey -v -keystore app/disruptibe-release.jks -keyalg RSA -keysize 2048 -validity 10000 -alias disruptibe-key -storepass "PasswordTemporal123" -keypass "PasswordTemporal123" -dname "CN=disrup-ti.be, O=Disruptibe, C=ES"

    - name: Limpiar y Compilar APK de Producción
      env:
        STORE_FILE: "disruptibe-release.jks"
        STORE_PASSWORD: "PasswordTemporal123"
        KEY_ALIAS: "disruptibe-key"
        KEY_PASSWORD: "PasswordTemporal123"
      run: |
        chmod +x gradlew
        ./gradlew clean assembleRelease -x test -x lint --no-daemon

    - name: Publicar APK para descarga interna
      uses: actions/upload-artifact@v4
      with:
        name: App-Disruptibe-Release
        path: app/build/outputs/apk/release/*.apk
        retention-days: 7
