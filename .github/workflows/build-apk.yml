name: Compilar APK Privada Disrup-ti.be (Forzado)

on:
  push:
    branches:
      - disruptibe-branding
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código fuente
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Aceptar Licencias de Android SDK de manera oficial
      run: |
        mkdir -p $ANDROID_HOME/licenses
        echo "24a33b3b76716dd559ebbc13321545bf8476a16e" > $ANDROID_HOME/licenses/android-sdk-license
        echo "84831b9409646a918e30573bab4c9c91346d8abd" > $ANDROID_HOME/licenses/android-sdk-preview-license
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Configurar Entorno de Compilación
      run: |
        mkdir -p ~/.gradle
        echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8" >> ~/.gradle/gradle.properties
        echo "android.lintOptions.abortOnError=false" >> ~/.gradle/gradle.properties
        # Crear un archivo de propiedades de Sentry falso para evitar que la compilación falle por falta de este componente
        echo "defaults.project=fake-project" > sentry.properties
        echo "defaults.org=fake-org" >> sentry.properties

    - name: Limpiar y Compilar APK de Organización (Evasión de Fallos)
      run: |
        chmod +x gradlew
        # -P... Desactiva el plugin de Sentry y las firmas comerciales integradas de Nextcloud
        ./gradlew clean assembleGenericDebug -x test -x lint -PdisableSentryPlugin=true -Pandroid.experimental.self-signed=true --no-daemon

    - name: Publicar APK para descarga interna
      uses: actions/upload-artifact@v4
      with:
        name: App-Disruptibe-Release
        path: app/build/outputs/apk/generic/debug/*.apk
        retention-days: 7
